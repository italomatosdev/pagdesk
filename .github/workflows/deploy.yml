# =============================================================================
# DEPLOY - Continuous Deployment para Produção
# Dispara apenas na branch main
# =============================================================================

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: '8.2'

jobs:
  # ---------------------------------------------------------------------------
  # Deploy no Servidor (build local no servidor)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            
            echo "🚀 Iniciando deploy..."
            cd /var/www/pagdesk
            
            echo "📥 Atualizando código..."
            git pull origin main
            
            echo "🔨 Fazendo build das imagens..."
            docker compose build
            
            echo "🔄 Atualizando containers..."
            docker compose up -d --remove-orphans
            
            echo "⏳ Aguardando containers ficarem saudáveis..."
            sleep 15
            
            echo "🗄️ Executando migrations..."
            docker exec pagdesk-app php artisan migrate --force
            
            echo "🧹 Limpando caches..."
            docker exec pagdesk-app php artisan config:clear
            docker exec pagdesk-app php artisan route:clear
            docker exec pagdesk-app php artisan view:clear
            docker exec pagdesk-app php artisan cache:clear
            
            echo "🔄 Reiniciando workers..."
            docker exec pagdesk-app php artisan queue:restart
            
            echo "🧹 Limpando imagens antigas..."
            docker image prune -af --filter "until=168h"
            
            echo "✅ Deploy concluído com sucesso!"

      - name: Verificar health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🏥 Verificando saúde da aplicação..."
            sleep 5
            
            for i in 1 2 3; do
              echo "Tentativa $i/3..."
              
              response=$(curl -s http://localhost/health)
              http_code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
              
              if [ "$http_code" = "200" ]; then
                status=$(echo "$response" | grep -o '"status":"[^"]*"' | head -1 | cut -d'"' -f4)
                
                if [ "$status" = "healthy" ] || [ "$status" = "degraded" ]; then
                  echo "✅ Aplicação saudável (status: $status)"
                  exit 0
                fi
              fi
              
              if [ $i -lt 3 ]; then
                echo "⏳ Aguardando 10s..."
                sleep 10
              fi
            done
            
            echo "❌ Health check falhou"
            docker compose logs --tail=30 app
            exit 1

      - name: Resumo do deploy
        if: success()
        run: |
          echo "## Deploy Concluído ✅" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
