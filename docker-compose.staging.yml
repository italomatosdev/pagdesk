# =============================================================================
# DOCKER COMPOSE - PagDesk (Homologação/Staging)
# Override para ambiente de homologação
# 
# Uso: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # APP - PHP-FPM (Staging)
  # ---------------------------------------------------------------------------
  app:
    environment:
      - APP_ENV=staging
      - APP_DEBUG=true
      - APP_URL=${APP_URL:-https://staging.pagdesk.com.br}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-pagdesk_staging}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - LOG_CHANNEL=stack
      - LOG_LEVEL=debug

  # ---------------------------------------------------------------------------
  # NGINX - Servidor Web (Staging)
  # ---------------------------------------------------------------------------
  nginx:
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"

  # ---------------------------------------------------------------------------
  # QUEUE - Worker de Filas (Staging)
  # ---------------------------------------------------------------------------
  queue:
    environment:
      - APP_ENV=staging
      - APP_DEBUG=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-pagdesk_staging}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

  # ---------------------------------------------------------------------------
  # SCHEDULER - Cron (Staging)
  # ---------------------------------------------------------------------------
  scheduler:
    environment:
      - APP_ENV=staging
      - APP_DEBUG=true
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-pagdesk_staging}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis

  # ---------------------------------------------------------------------------
  # GRAFANA - Dashboards (Staging)
  # ---------------------------------------------------------------------------
  grafana:
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-staging_password}
      - GF_SERVER_ROOT_URL=https://grafana-staging.pagdesk.com.br
