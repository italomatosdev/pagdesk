; =============================================================================
; OPCACHE - Cache de Bytecode PHP
; PagDesk - Otimização para Produção
; =============================================================================

[opcache]
; Habilitar OPcache
opcache.enable = 1
opcache.enable_cli = 1

; Memória para scripts em cache
opcache.memory_consumption = 128

; Memória para strings internadas
opcache.interned_strings_buffer = 16

; Número máximo de scripts em cache
opcache.max_accelerated_files = 10000

; Validação de timestamps (0 = produção, 1 = desenvolvimento)
; Em produção, não verifica se arquivos foram modificados (melhor performance)
; Após deploy, reiniciar PHP-FPM para limpar cache
opcache.validate_timestamps = ${PHP_OPCACHE_VALIDATE_TIMESTAMPS:-0}

; Frequência de verificação (apenas se validate_timestamps = 1)
opcache.revalidate_freq = 0

; Otimizações
opcache.fast_shutdown = 1
opcache.enable_file_override = 1

; JIT (PHP 8+) - Desabilitado por padrão, pode causar problemas em alguns casos
; opcache.jit_buffer_size = 100M
; opcache.jit = 1255

; Salvar comentários (necessário para algumas libs como Doctrine)
opcache.save_comments = 1

; Logs de OPcache
opcache.log_verbosity_level = 1
