; =============================================================================
; PHP.INI - Configurações para Produção
; PagDesk - Laravel Application
; =============================================================================

[PHP]
; Ambiente de produção
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php/error.log

; Limites de memória e execução
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
max_input_vars = 3000

; Upload de arquivos
file_uploads = On
upload_max_filesize = 50M
post_max_size = 50M
max_file_uploads = 20

; Timezone
date.timezone = America/Sao_Paulo

; Session
session.gc_maxlifetime = 1440
session.cookie_httponly = 1
session.cookie_secure = 0
session.use_strict_mode = 1

; Realpath cache (melhora performance)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; Expose PHP version (segurança)
expose_php = Off

; Precisão de números (importante para valores financeiros)
precision = 14
serialize_precision = -1

[Date]
date.timezone = America/Sao_Paulo

[mail function]
; Configuração de e-mail via SMTP será feita pelo Laravel
sendmail_path = /usr/sbin/sendmail -t -i

[MySQLi]
mysqli.default_socket = 
mysqli.default_host = 
mysqli.default_user = 
mysqli.default_pw = 
mysqli.reconnect = Off

[PDO_MySQL]
pdo_mysql.default_socket = 

[bcmath]
bcmath.scale = 2
