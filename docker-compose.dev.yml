  #   ports:
  #     - "${DB_PORT:-3306}:3306"
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
  #     - MYSQL_DATABASE=${DB_DATABASE:-pagdesk}
  #     - MYSQL_USER=${DB_USERNAME:-pagdesk}
  #     - MYSQL_PASSWORD=${DB_PASSWORD:-secret}
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  # ---------------------------------------------------------------------------
  # MAILPIT - Captura de E-mails (Desenvolvimento)
  # ---------------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: pagdesk-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_HTTP_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - app-network

