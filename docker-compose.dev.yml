# =============================================================================
# DOCKER COMPOSE - PagDesk (Desenvolvimento Local)
# Override para ambiente de desenvolvimento
# 
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # APP - PHP-FPM (Desenvolvimento)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_ENV: local
        APP_DEBUG: "true"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=1
    volumes:
      # Monta código fonte para hot reload
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage/framework

  # ---------------------------------------------------------------------------
  # NGINX - Servidor Web (Desenvolvimento)
  # ---------------------------------------------------------------------------
  nginx:
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html

  # ---------------------------------------------------------------------------
  # QUEUE - Worker de Filas (Desenvolvimento)
  # ---------------------------------------------------------------------------
  queue:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage/framework
    # Reinicia mais rápido em desenvolvimento
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=60"]

  # ---------------------------------------------------------------------------
  # SCHEDULER - Cron (Desenvolvimento)
  # ---------------------------------------------------------------------------
  scheduler:
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - /var/www/html/storage/framework

  # ---------------------------------------------------------------------------
  # MYSQL - Banco de Dados Local (COMENTADO - usando MySQL local do host)
  # Descomente se quiser usar MySQL no Docker
  # ---------------------------------------------------------------------------
  # mysql:
  #   image: mysql:8.0
