; Configurações de upload para o sistema de crédito
; Este arquivo pode ser usado se você estiver usando PHP-FPM ou servidor integrado

; Tamanho máximo de arquivo para upload
upload_max_filesize = 10M

; Tamanho máximo de dados POST
post_max_size = 30M

; Número máximo de arquivos que podem ser enviados simultaneamente
max_file_uploads = 20

; Tempo máximo de execução (em segundos)
max_execution_time = 300

; Tempo máximo para processar dados de entrada
max_input_time = 300

; Memória máxima que um script pode consumir
memory_limit = 256M
